<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-label="snake-eat-graph preview">
  <rect width="600" height="300" fill="#0d1117"/>
  <text x="40" y="44" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e8edff">contribution snake</text>
  <text x="40" y="62" font-family="ui-monospace, monospace" font-size="11" fill="#39d353" letter-spacing="2">EATING SQUARES SINCE 2019</text>
  <g transform="translate(40,90)">
    <!-- contribution grid -->
    <g fill="#0e4429">
      <rect width="14" height="14" rx="2"/>
      <rect x="20" width="14" height="14" rx="2" fill="#26a641"/>
      <rect x="40" width="14" height="14" rx="2" fill="#39d353"/>
      <rect x="60" width="14" height="14" rx="2" fill="#006d32"/>
      <rect x="80" width="14" height="14" rx="2"/>
      <rect x="100" width="14" height="14" rx="2" fill="#26a641"/>
      <rect x="120" width="14" height="14" rx="2" fill="#39d353"/>
      <rect x="140" width="14" height="14" rx="2"/>
      <rect x="160" width="14" height="14" rx="2" fill="#006d32"/>
      <rect x="180" width="14" height="14" rx="2" fill="#26a641"/>
      <rect x="200" width="14" height="14" rx="2"/>
      <rect x="220" width="14" height="14" rx="2" fill="#39d353"/>
      <rect x="240" width="14" height="14" rx="2" fill="#006d32"/>
      <rect x="260" width="14" height="14" rx="2"/>
      <rect x="280" width="14" height="14" rx="2" fill="#26a641"/>
      <rect x="300" width="14" height="14" rx="2" fill="#39d353"/>
      <rect x="320" width="14" height="14" rx="2"/>
      <rect x="340" width="14" height="14" rx="2" fill="#006d32"/>
      <rect x="360" width="14" height="14" rx="2"/>
      <rect x="380" width="14" height="14" rx="2" fill="#26a641"/>
      <rect x="400" width="14" height="14" rx="2"/>
      <rect x="420" width="14" height="14" rx="2" fill="#39d353"/>
      <rect x="440" width="14" height="14" rx="2"/>
      <rect x="460" width="14" height="14" rx="2" fill="#26a641"/>
      <rect x="480" width="14" height="14" rx="2" fill="#39d353"/>
      <rect x="500" width="14" height="14" rx="2"/>
    </g>
    <!-- snake -->
    <g>
      <rect x="-10" y="0" width="14" height="14" rx="2" fill="#7c5cff">
        <animate attributeName="x" values="-10;520;-10" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="-30" y="0" width="14" height="14" rx="2" fill="#7c5cff" opacity="0.7">
        <animate attributeName="x" values="-30;500;-30" dur="8s" repeatCount="indefinite"/>
      </rect>
      <rect x="-50" y="0" width="14" height="14" rx="2" fill="#7c5cff" opacity="0.45">
        <animate attributeName="x" values="-50;480;-50" dur="8s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  <text x="40" y="270" font-family="ui-monospace, monospace" font-size="10" fill="#586069">action: Platane/snk · runs daily on schedule</text>
</svg>
