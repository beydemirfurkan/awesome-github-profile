<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-label="cyberpunk-neon preview">
  <defs>
    <linearGradient id="cn-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a001a"/>
      <stop offset="1" stop-color="#1a0030"/>
    </linearGradient>
    <pattern id="cn-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0 H0 V20" fill="none" stroke="#3a0070" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="600" height="300" fill="url(#cn-bg)"/>
  <rect width="600" height="300" fill="url(#cn-grid)"/>
  <!-- horizon -->
  <line x1="0" y1="200" x2="600" y2="200" stroke="#ff00ff" stroke-width="1" opacity="0.7"/>
  <!-- perspective lines -->
  <line x1="0" y1="300" x2="300" y2="200" stroke="#ff00ff" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="300" x2="300" y2="200" stroke="#ff00ff" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="300" x2="300" y2="200" stroke="#ff00ff" stroke-width="1" opacity="0.5"/>
  <line x1="360" y1="300" x2="300" y2="200" stroke="#ff00ff" stroke-width="1" opacity="0.5"/>
  <line x1="480" y1="300" x2="300" y2="200" stroke="#ff00ff" stroke-width="1" opacity="0.5"/>
  <line x1="600" y1="300" x2="300" y2="200" stroke="#ff00ff" stroke-width="1" opacity="0.5"/>
  <!-- title -->
  <text x="300" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="900" fill="#00ffe7" letter-spacing="-2">JANE_DOE</text>
  <text x="300" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#ff00d9" letter-spacing="-2" opacity="0.7" transform="translate(2,2)">JANE_DOE</text>
  <text x="300" y="138" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#00ffe7" letter-spacing="6">// FRONTEND_ENGINEER.exe</text>
  <!-- chips -->
  <g font-family="ui-monospace, monospace" font-size="10" fill="#00ffe7">
    <g transform="translate(180,160)">
      <rect width="80" height="22" fill="none" stroke="#00ffe7"/>
      <text x="40" y="15" text-anchor="middle">[ react ]</text>
    </g>
    <g transform="translate(270,160)">
      <rect width="80" height="22" fill="none" stroke="#ff00d9"/>
      <text x="40" y="15" text-anchor="middle" fill="#ff00d9">[ webgl ]</text>
    </g>
    <g transform="translate(360,160)">
      <rect width="80" height="22" fill="none" stroke="#00ffe7"/>
      <text x="40" y="15" text-anchor="middle">[ rust ]</text>
    </g>
  </g>
</svg>
