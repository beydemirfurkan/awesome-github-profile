<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-label="Holographic Foil preview">
  <defs>
    <linearGradient id="hfp-foil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9">
        <animate attributeName="stop-color" values="#67e8f9;#f472b6;#fcd34d;#6ee7b7;#67e8f9" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#f472b6">
        <animate attributeName="stop-color" values="#f472b6;#fcd34d;#a78bfa;#67e8f9;#f472b6" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#fcd34d">
        <animate attributeName="stop-color" values="#fcd34d;#a78bfa;#67e8f9;#f472b6;#fcd34d" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="hfp-sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#fff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="hfp-scales" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M0,11 Q5.5,3 11,11 Q16.5,19 22,11" fill="none" stroke="#fff" stroke-width="0.3" opacity="0.18"/>
    </pattern>
    <clipPath id="hfp-clip"><rect x="60" y="40" width="480" height="220" rx="14"/></clipPath>
  </defs>
