<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-label="Light/Dark Switcher preview">
  <!-- Background morphs light↔dark -->
  <rect width="600" height="300" fill="#fafafa">
    <animate attributeName="fill" values="#fafafa;#fafafa;#0a0e1a;#0a0e1a;#fafafa" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtle dotted pattern (decorative, animated) -->
  <g opacity="0.4">
    <circle cx="40" cy="40" r="0.8" fill="#cbd5e1"><animate attributeName="fill" values="#cbd5e1;#cbd5e1;#1f2540;#1f2540;#cbd5e1" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="40" r="0.8" fill="#cbd5e1"><animate attributeName="fill" values="#cbd5e1;#cbd5e1;#1f2540;#1f2540;#cbd5e1" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="40" r="0.8" fill="#cbd5e1"><animate attributeName="fill" values="#cbd5e1;#cbd5e1;#1f2540;#1f2540;#cbd5e1" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="40" cy="270" r="0.8" fill="#cbd5e1"><animate attributeName="fill" values="#cbd5e1;#cbd5e1;#1f2540;#1f2540;#cbd5e1" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="270" r="0.8" fill="#cbd5e1"><animate attributeName="fill" values="#cbd5e1;#cbd5e1;#1f2540;#1f2540;#cbd5e1" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Top label -->
  <text x="60" y="36" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="3" fill="#64748b">
    <animate attributeName="fill" values="#64748b;#64748b;#94a3b8;#94a3b8;#64748b" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
    PROFILE  ·  ONE FILE, TWO REALITIES
  </text>

  <!-- PROFILE CARD -->
  <!-- Card surface -->
  <rect x="60" y="58" width="430" height="210" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1">
    <animate attributeName="fill"   values="#ffffff;#ffffff;#15192e;#15192e;#ffffff" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="stroke" values="#e2e8f0;#e2e8f0;#1f2540;#1f2540;#e2e8f0" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Avatar circle (accent) -->
  <circle cx="100" cy="102" r="22" fill="#10b981">
    <animate attributeName="fill" values="#10b981;#10b981;#a78bfa;#a78bfa;#10b981" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
  </circle>
  <text x="100" y="108" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">JD</text>

  <!-- Name -->
  <text x="138" y="98" font-family="'Fraunces', Georgia, serif" font-size="20" font-weight="700" fill="#0f172a">
    <animate attributeName="fill" values="#0f172a;#0f172a;#f1f5f9;#f1f5f9;#0f172a" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
    Jane Doe
  </text>

  <!-- Handle -->
  <text x="138" y="118" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64748b">
    <animate attributeName="fill" values="#64748b;#64748b;#94a3b8;#94a3b8;#64748b" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
    @janedoe  ·  frontend.engineer
  </text>

  <!-- Bio -->
  <text x="80" y="158" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#475569">
    <animate attributeName="fill" values="#475569;#475569;#cbd5e1;#cbd5e1;#475569" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
    Building the parts of products that nobody notices
  </text>
  <text x="80" y="176" font-family="'Inter', sans-serif" font-size="12" fill="#475569">
    <animate attributeName="fill" values="#475569;#475569;#cbd5e1;#cbd5e1;#475569" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
    when they work — and exactly noticed when they don't.
  </text>

  <!-- Stat chips -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">
    <g transform="translate(80,196)">
      <rect width="86" height="26" rx="13" fill="none" stroke="#e2e8f0" stroke-width="1">
        <animate attributeName="stroke" values="#e2e8f0;#e2e8f0;#1f2540;#1f2540;#e2e8f0" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
      </rect>
      <text x="43" y="17" text-anchor="middle" fill="#0f172a">
        <animate attributeName="fill" values="#0f172a;#0f172a;#f1f5f9;#f1f5f9;#0f172a" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
        ★ 1.2K
      </text>
    </g>
    <g transform="translate(176,196)">
      <rect width="86" height="26" rx="13" fill="none" stroke="#e2e8f0" stroke-width="1">
        <animate attributeName="stroke" values="#e2e8f0;#e2e8f0;#1f2540;#1f2540;#e2e8f0" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
      </rect>
      <text x="43" y="17" text-anchor="middle" fill="#0f172a">
        <animate attributeName="fill" values="#0f172a;#0f172a;#f1f5f9;#f1f5f9;#0f172a" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
        ▲ 47 PR
      </text>
    </g>
    <g transform="translate(272,196)">
      <rect width="86" height="26" rx="13" fill="#10b981">
        <animate attributeName="fill" values="#10b981;#10b981;#a78bfa;#a78bfa;#10b981" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
      </rect>
      <circle cx="14" cy="13" r="3" fill="#ffffff">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <text x="49" y="17" text-anchor="middle" fill="#ffffff">live · 47d</text>
    </g>
  </g>

  <!-- Mini sparkline -->
  <g transform="translate(80,232)">
    <polyline points="0,20 30,16 60,18 90,12 120,14 150,8 180,10 210,4 240,6 270,0" fill="none" stroke="#10b981" stroke-width="1.6">
      <animate attributeName="stroke" values="#10b981;#10b981;#a78bfa;#a78bfa;#10b981" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
    </polyline>
    <text x="280" y="14" font-family="'JetBrains Mono', monospace" font-size="9" fill="#64748b">
      <animate attributeName="fill" values="#64748b;#64748b;#94a3b8;#94a3b8;#64748b" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
      30D
    </text>
  </g>

  <!-- Theme indicator (sun ↔ moon) — top-right of card -->
  <g transform="translate(456,82)">
    <!-- Disk -->
    <circle r="16" fill="#fcd34d">
      <animate attributeName="fill" values="#fcd34d;#fcd34d;#e2e8f0;#e2e8f0;#fcd34d" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
    </circle>
    <!-- Crescent (only in dark phase) -->
    <circle cx="-5" cy="-2" r="13" fill="#15192e" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.45;0.55;0.9;1" dur="7s" repeatCount="indefinite"/>
    </circle>
    <!-- Sun rays (only in light phase) -->
    <g stroke="#fcd34d" stroke-width="1.3" stroke-linecap="round">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
      <line x1="0" y1="-22" x2="0" y2="-26"/>
      <line x1="22" y1="0" x2="26" y2="0"/>
      <line x1="0" y1="22" x2="0" y2="26"/>
      <line x1="-22" y1="0" x2="-26" y2="0"/>
      <line x1="16" y1="-16" x2="19" y2="-19"/>
      <line x1="16" y1="16" x2="19" y2="19"/>
      <line x1="-16" y1="-16" x2="-19" y2="-19"/>
      <line x1="-16" y1="16" x2="-19" y2="16"/>
    </g>
    <!-- Stars (only in dark phase) -->
    <g>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.45;0.55;0.9;1" dur="7s" repeatCount="indefinite"/>
      <circle cx="14" cy="-12" r="0.7" fill="#fef3c7"/>
      <circle cx="22" cy="-2" r="0.5" fill="#fef3c7"/>
      <circle cx="18" cy="6" r="0.6" fill="#fef3c7"/>
    </g>
  </g>

  <!-- Bottom caption -->
  <g transform="translate(300,288)" font-family="'JetBrains Mono', monospace" font-size="8" letter-spacing="3" text-anchor="middle">
    <text fill="#64748b">
      <animate attributeName="fill" values="#64748b;#64748b;#94a3b8;#94a3b8;#64748b" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
      &lt;picture&gt;  ·  prefers-color-scheme  ·  ADAPTS LIVE
    </text>
  </g>

  <!-- Top-right indicator label -->
  <text x="540" y="36" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="3" fill="#10b981">
    <animate attributeName="fill" values="#10b981;#10b981;#a78bfa;#a78bfa;#10b981" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
    AUTO ·
    <tspan fill="#0f172a">
      <animate attributeName="fill" values="#0f172a;#0f172a;#f1f5f9;#f1f5f9;#0f172a" keyTimes="0;0.42;0.5;0.92;1" dur="7s" repeatCount="indefinite"/>
       SYSTEM
    </tspan>
  </text>
</svg>
