<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="Typewriter Intro">
  <defs>
    <linearGradient id="ti-stage" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1238"/>
      <stop offset="1" stop-color="#0d0820"/>
    </linearGradient>
    <filter id="ti-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#ti-stage)"/>

  <!-- Terminal window -->
  <g filter="url(#ti-shadow)">
    <rect x="80" y="40" width="1040" height="340" rx="14" fill="#11131c"/>
    <!-- Title bar -->
    <rect x="80" y="40" width="1040" height="38" rx="14" fill="#1c1f2e"/>
    <rect x="80" y="60" width="1040" height="18" fill="#1c1f2e"/>
    <line x1="80" y1="78" x2="1120" y2="78" stroke="#0a0c14" stroke-width="0.6"/>
  </g>

  <!-- Traffic lights -->
  <circle cx="106" cy="59" r="6.5" fill="#ff5f56"/>
  <circle cx="128" cy="59" r="6.5" fill="#ffbd2e"/>
  <circle cx="150" cy="59" r="6.5" fill="#27c93f"/>

  <!-- Window title -->
  <text x="600" y="63" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#7a7f99" letter-spacing="2">~/jane — zsh — 124×34</text>

  <!-- Tab indicator -->
  <g transform="translate(180,78)">
    <rect width="160" height="22" fill="#11131c"/>
    <line x1="0" y1="0" x2="0" y2="22" stroke="#2a2e44" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="22" stroke="#2a2e44" stroke-width="0.5"/>
    <text x="80" y="16" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#a78bfa">jane@studio</text>
  </g>

  <!-- Terminal content -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14">
    <!-- Prompt 1 -->
    <text x="110" y="130" fill="#a78bfa">jane@studio</text>
    <text x="220" y="130" fill="#7a7f99">:</text>
    <text x="226" y="130" fill="#7ee787">~</text>
    <text x="236" y="130" fill="#7a7f99">$</text>
    <text x="248" y="130" fill="#c9d1d9">whoami --verbose</text>
    <text x="110" y="152" fill="#c9d1d9">↳ Jane Doe — frontend.engineer · motion · type</text>
    <text x="110" y="170" fill="#7a7f99">  est.2017 · istanbul · open to select projects</text>

    <!-- Prompt 2 -->
    <text x="110" y="206" fill="#a78bfa">jane@studio</text>
    <text x="220" y="206" fill="#7a7f99">:</text>
    <text x="226" y="206" fill="#7ee787">~</text>
    <text x="236" y="206" fill="#7a7f99">$</text>
    <text x="248" y="206" fill="#c9d1d9">cat now.md</text>
    <text x="110" y="228" fill="#fcd34d">## currently</text>
    <text x="110" y="248" fill="#c9d1d9">- shaping the design system at acme</text>
    <text x="110" y="266" fill="#c9d1d9">- writing about css.layers and motion at jane.dev/log</text>
    <text x="110" y="284" fill="#c9d1d9">- learning rust shaders for fun</text>

    <!-- Prompt 3 -->
    <text x="110" y="320" fill="#a78bfa">jane@studio</text>
    <text x="220" y="320" fill="#7a7f99">:</text>
    <text x="226" y="320" fill="#7ee787">~</text>
    <text x="236" y="320" fill="#7a7f99">$</text>
    <text x="248" y="320" fill="#c9d1d9">contact --all</text>
    <text x="110" y="342" fill="#58a6ff">→ jane.dev</text>
    <text x="220" y="342" fill="#58a6ff">@janedoe</text>
    <text x="320" y="342" fill="#58a6ff">in/janedoe</text>
    <text x="430" y="342" fill="#58a6ff">hello@jane.dev</text>

    <!-- Final prompt with cursor -->
    <text x="110" y="372" fill="#a78bfa">jane@studio</text>
    <text x="220" y="372" fill="#7a7f99">:</text>
    <text x="226" y="372" fill="#7ee787">~</text>
    <text x="236" y="372" fill="#7a7f99">$</text>
    <rect x="252" y="360" width="9" height="14" fill="#c9d1d9">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Status bar at bottom of window -->
  <g transform="translate(80,378)" font-family="'JetBrains Mono', monospace" font-size="10" fill="#5a5f7a">
    <text x="14" y="0">UTF-8</text>
    <text x="80" y="0">zsh</text>
    <text x="140" y="0">⌘K · clear</text>
    <text x="1026" y="0" text-anchor="end" fill="#7ee787">● connected</text>
  </g>
</svg>
