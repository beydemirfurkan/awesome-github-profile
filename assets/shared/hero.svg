<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Awesome GitHub Profile">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.5" stop-color="#13193a"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.5" stop-color="#00d9ff"/>
      <stop offset="1" stop-color="#ff5cdb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#1d2550" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.6"/>

  <!-- ambient glow -->
  <circle cx="240" cy="170" r="260" fill="url(#glow)">
    <animate attributeName="cx" values="240;320;240" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="980" cy="150" r="240" fill="url(#glow)" opacity="0.7">
    <animate attributeName="cx" values="980;900;980" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- accent bar -->
  <rect x="80" y="80" width="6" height="160" rx="3" fill="url(#accent)">
    <animate attributeName="height" values="160;120;160" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="80;100;80" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- eyebrow -->
  <text x="110" y="110" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" letter-spacing="6" fill="#8b94c7">SENIOR-GRADE README KIT</text>

  <!-- title -->
  <text x="110" y="180" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="64" font-weight="800" fill="#f5f7ff" letter-spacing="-1">Awesome GitHub Profile</text>

  <!-- subtitle with shimmer -->
  <text x="110" y="222" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="500" fill="url(#accent)">From minimal to 3D — copy, paste, ship.</text>

  <!-- mini chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#cdd3f5">
    <g transform="translate(110,254)">
      <rect width="92" height="28" rx="14" fill="#1a2150" stroke="#2a3380"/>
      <text x="46" y="18" text-anchor="middle">minimal</text>
    </g>
    <g transform="translate(212,254)">
      <rect width="92" height="28" rx="14" fill="#1a2150" stroke="#2a3380"/>
      <text x="46" y="18" text-anchor="middle">animated</text>
    </g>
    <g transform="translate(314,254)">
      <rect width="80" height="28" rx="14" fill="#1a2150" stroke="#2a3380"/>
      <text x="40" y="18" text-anchor="middle">3D</text>
    </g>
    <g transform="translate(404,254)">
      <rect width="92" height="28" rx="14" fill="#1a2150" stroke="#2a3380"/>
      <text x="46" y="18" text-anchor="middle">gamified</text>
    </g>
    <g transform="translate(506,254)">
      <rect width="100" height="28" rx="14" fill="#1a2150" stroke="#2a3380"/>
      <text x="50" y="18" text-anchor="middle">dashboard</text>
    </g>
    <g transform="translate(616,254)">
      <rect width="92" height="28" rx="14" fill="#1a2150" stroke="#2a3380"/>
      <text x="46" y="18" text-anchor="middle">themed</text>
    </g>
  </g>

  <!-- right-side mock card -->
  <g transform="translate(820,70)">
    <rect width="300" height="180" rx="16" fill="#0f163a" stroke="#2a3380"/>
    <rect x="16" y="16" width="60" height="6" rx="3" fill="url(#accent)"/>
    <rect x="16" y="32" width="180" height="10" rx="3" fill="#cdd3f5"/>
    <rect x="16" y="50" width="220" height="6" rx="3" fill="#3a4480"/>
    <rect x="16" y="62" width="140" height="6" rx="3" fill="#3a4480"/>
    <g transform="translate(16,86)">
      <rect width="84" height="60" rx="8" fill="#1a2150" stroke="#2a3380"/>
      <rect x="92" width="84" height="60" rx="8" fill="#1a2150" stroke="#2a3380"/>
      <rect x="184" width="84" height="60" rx="8" fill="#1a2150" stroke="#2a3380"/>
      <circle cx="42" cy="30" r="14" fill="#7c5cff" opacity="0.85">
        <animate attributeName="r" values="14;16;14" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <rect x="120" y="20" width="28" height="20" rx="4" fill="#00d9ff" opacity="0.85"/>
      <path d="M210 40 L226 24 L242 40 L242 50 L210 50 Z" fill="#ff5cdb" opacity="0.85"/>
    </g>
    <rect x="16" y="158" width="40" height="6" rx="3" fill="#3a4480"/>
    <rect x="62" y="158" width="40" height="6" rx="3" fill="#3a4480"/>
    <rect x="108" y="158" width="40" height="6" rx="3" fill="#3a4480"/>
  </g>
</svg>
