<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="Aurora Veil hero">
  <defs>
    <!-- Sky -->
    <radialGradient id="av-sky" cx="0.5" cy="1" r="1.1">
      <stop offset="0" stop-color="#0e1b3a"/>
      <stop offset="0.55" stop-color="#070b22"/>
      <stop offset="1" stop-color="#03050f"/>
    </radialGradient>

    <!-- Aurora ribbon palettes -->
    <linearGradient id="av-teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fffe6" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#3fffe6" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#7df9ff" stop-opacity="0.85"/>
      <stop offset="0.85" stop-color="#3fffe6" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#3fffe6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="av-magenta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff3d8a" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#ff3d8a" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#a78bfa" stop-opacity="0.75"/>
      <stop offset="0.85" stop-color="#ff3d8a" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ff3d8a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="av-amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4d35e" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#fcd34d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f4d35e" stop-opacity="0"/>
    </linearGradient>

    <!-- Living turbulence: animated baseFrequency + seed -->
    <filter id="av-flow1" x="-30%" y="-50%" width="160%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006 0.022" numOctaves="3" seed="2" result="t1">
        <animate attributeName="baseFrequency" values="0.006 0.022;0.011 0.028;0.006 0.022" dur="24s" repeatCount="indefinite"/>
        <animate attributeName="seed" from="0" to="40" dur="40s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="t1" scale="90" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="av-flow2" x="-30%" y="-50%" width="160%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.009 0.026" numOctaves="2" seed="9" result="t2">
        <animate attributeName="baseFrequency" values="0.009 0.026;0.014 0.034;0.009 0.026" dur="18s" repeatCount="indefinite"/>
        <animate attributeName="seed" from="0" to="30" dur="32s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="t2" scale="70"/>
    </filter>
    <filter id="av-flow3" x="-30%" y="-50%" width="160%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.04" numOctaves="2" seed="17" result="t3">
        <animate attributeName="seed" from="0" to="50" dur="22s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="t3" scale="48"/>
    </filter>

    <!-- Soft glow for the headline -->
    <filter id="av-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>

    <!-- Grain overlay -->
    <filter id="av-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.95
                            0 0 0 0 0.95
                            0 0 0 0 0.95
                            0 0 0 0.06 0"/>
    </filter>

    <!-- Mountain silhouette -->
    <linearGradient id="av-mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#03050f"/>
      <stop offset="1" stop-color="#000004"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="420" fill="url(#av-sky)"/>

  <!-- Distant cosmic dust -->
  <rect width="1200" height="420" filter="url(#av-grain)" opacity="0.4"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="80"   cy="42"  r="0.8"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="160"  cy="78"  r="1.1"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="240"  cy="34"  r="0.7"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="318"  cy="98"  r="0.9"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="402"  cy="58"  r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="490"  cy="32"  r="0.8"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="568"  cy="82"  r="1"  ><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="642"  cy="48"  r="0.7"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="724"  cy="106" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle cx="802"  cy="36"  r="0.9"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="884"  cy="74"  r="0.8"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="962"  cy="44"  r="1.1"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="4.7s" repeatCount="indefinite"/></circle>
    <circle cx="1042" cy="92"  r="0.7"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="1118" cy="56"  r="1"  ><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="1170" cy="22"  r="0.8"><animate attributeName="opacity" values="0.3;0.85;0.3" dur="4.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Aurora layer 3 (deepest, amber, slow) -->
  <g filter="url(#av-flow1)" opacity="0.55">
    <rect x="-100" y="120" width="1400" height="120" fill="url(#av-amber)"/>
  </g>

  <!-- Aurora layer 2 (mid, magenta-violet) -->
  <g filter="url(#av-flow2)" opacity="0.85">
    <rect x="-100" y="80" width="1400" height="160" fill="url(#av-magenta)"/>
  </g>

  <!-- Aurora layer 1 (front, electric teal) -->
  <g filter="url(#av-flow3)" opacity="0.92">
    <rect x="-100" y="60" width="1400" height="180" fill="url(#av-teal)"/>
  </g>

  <!-- Reflection on horizon (subtle) -->
  <g opacity="0.18" filter="url(#av-flow2)" transform="translate(0,420) scale(1,-0.35)">
    <rect x="-100" y="80" width="1400" height="160" fill="url(#av-magenta)"/>
  </g>

  <!-- Mountain silhouette -->
  <path d="M0,420 L0,300 L80,272 L150,288 L210,250 L280,280 L340,238 L420,272 L490,250 L580,290 L640,260 L720,295 L800,258 L880,288 L950,266 L1030,302 L1100,278 L1170,294 L1200,280 L1200,420 Z" fill="url(#av-mtn)"/>
  <!-- Mountain inner highlight -->
  <path d="M0,300 L80,272 L150,288 L210,250 L280,280 L340,238 L420,272 L490,250 L580,290 L640,260 L720,295 L800,258 L880,288 L950,266 L1030,302 L1100,278 L1170,294 L1200,280" fill="none" stroke="#3fffe6" stroke-width="0.6" opacity="0.5"/>

  <!-- Type — sits on top of horizon -->
  <g font-family="'Fraunces', 'Playfair Display', Georgia, serif">
    <text x="80" y="368" font-size="74" font-weight="500" font-style="italic" fill="#fef3c7" filter="url(#av-glow)" letter-spacing="-1.5">Jane Doe</text>
  </g>
  <g font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace">
    <text x="82" y="396" font-size="11" fill="#3fffe6" letter-spacing="6" opacity="0.95">∗ DESIGNER · ENGINEER · OBSERVER ∗</text>
  </g>
  <text x="1120" y="396" text-anchor="end" font-family="'Fraunces', Georgia, serif" font-style="italic" font-size="14" fill="#cbd5e1" opacity="0.55">59°54′N · 10°44′E</text>

  <!-- Editorial corner mark -->
  <g transform="translate(80,40)" font-family="'JetBrains Mono', monospace" font-size="9" fill="#94a3b8" letter-spacing="3">
    <line x1="0" y1="0" x2="14" y2="0" stroke="#94a3b8" stroke-width="0.6"/>
    <text x="20" y="3">VOL.MMXXVI · ISSUE 01</text>
  </g>
  <g transform="translate(1120,40)" font-family="'JetBrains Mono', monospace" font-size="9" fill="#94a3b8" letter-spacing="3" text-anchor="end">
    <text x="-20" y="3">N 79.984%  ·  STREAM 03</text>
    <line x1="-14" y1="0" x2="0" y2="0" stroke="#94a3b8" stroke-width="0.6"/>
  </g>
</svg>
