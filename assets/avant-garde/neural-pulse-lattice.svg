<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="Neural Pulse Lattice">
  <defs>
    <!-- Edge paths (animateMotion targets) -->
    <path id="np-e1"  d="M 120 80  L 240 140"/>
    <path id="np-e2"  d="M 120 80  L 180 250"/>
    <path id="np-e3"  d="M 240 140 L 180 250"/>
    <path id="np-e4"  d="M 240 140 L 340 80"/>
    <path id="np-e5"  d="M 240 140 L 450 140"/>
    <path id="np-e6"  d="M 180 250 L 340 220"/>
    <path id="np-e7"  d="M 340 80  L 450 140"/>
    <path id="np-e8"  d="M 340 80  L 560 90"/>
    <path id="np-e9"  d="M 340 220 L 450 140"/>
    <path id="np-e10" d="M 340 220 L 520 250"/>
    <path id="np-e11" d="M 450 140 L 640 180"/>
    <path id="np-e12" d="M 560 90  L 640 180"/>
    <path id="np-e13" d="M 520 250 L 640 180"/>
    <path id="np-e14" d="M 520 250 L 620 320"/>
    <path id="np-e15" d="M 640 180 L 620 320"/>

    <!-- Node halo -->
    <radialGradient id="np-halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4fbcff" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#4fbcff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4fbcff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="np-halo-v" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <!-- Background scan -->
    <linearGradient id="np-scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4fbcff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#4fbcff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#4fbcff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter for pulses -->
    <filter id="np-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <!-- Stage -->
  <rect width="1200" height="420" fill="#050810"/>

  <!-- Background grid -->
  <g stroke="#0e1a30" stroke-width="0.5">
    <line x1="0" y1="60"  x2="780" y2="60"/>
    <line x1="0" y1="140" x2="780" y2="140"/>
    <line x1="0" y1="220" x2="780" y2="220"/>
    <line x1="0" y1="300" x2="780" y2="300"/>
    <line x1="80"  y1="0" x2="80"  y2="420"/>
    <line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="320" y1="0" x2="320" y2="420"/>
    <line x1="440" y1="0" x2="440" y2="420"/>
    <line x1="560" y1="0" x2="560" y2="420"/>
    <line x1="680" y1="0" x2="680" y2="420"/>
  </g>

  <!-- Scan band -->
  <rect width="780" height="120" fill="url(#np-scan)" opacity="0.7">
    <animate attributeName="y" values="-120;420;-120" dur="11s" repeatCount="indefinite"/>
  </rect>

  <!-- Edges (rendered) -->
  <g stroke="#1a2a4a" stroke-width="0.8" fill="none">
    <use href="#np-e1"/><use href="#np-e2"/><use href="#np-e3"/><use href="#np-e4"/><use href="#np-e5"/>
    <use href="#np-e6"/><use href="#np-e7"/><use href="#np-e8"/><use href="#np-e9"/><use href="#np-e10"/>
    <use href="#np-e11"/><use href="#np-e12"/><use href="#np-e13"/><use href="#np-e14"/><use href="#np-e15"/>
  </g>

  <!-- Nodes — halo + core -->
  <g>
    <!-- n1 -->
    <circle cx="120" cy="80" r="14" fill="url(#np-halo)"><animate attributeName="r" values="14;22;14" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="80" r="3.4" fill="#4fbcff"/>
    <!-- n2 -->
    <circle cx="240" cy="140" r="14" fill="url(#np-halo)"><animate attributeName="r" values="14;22;14" dur="2.8s" repeatCount="indefinite" begin="0.4s"/></circle>
    <circle cx="240" cy="140" r="3.4" fill="#4fbcff"/>
    <!-- n3 -->
    <circle cx="180" cy="250" r="14" fill="url(#np-halo-v)"><animate attributeName="r" values="14;22;14" dur="3.6s" repeatCount="indefinite" begin="0.9s"/></circle>
    <circle cx="180" cy="250" r="3.4" fill="#a78bfa"/>
    <!-- n4 -->
    <circle cx="340" cy="80" r="14" fill="url(#np-halo)"><animate attributeName="r" values="14;22;14" dur="3.1s" repeatCount="indefinite" begin="1.4s"/></circle>
    <circle cx="340" cy="80" r="3.4" fill="#4fbcff"/>
    <!-- n5 -->
    <circle cx="340" cy="220" r="14" fill="url(#np-halo-v)"><animate attributeName="r" values="14;22;14" dur="2.9s" repeatCount="indefinite" begin="0.2s"/></circle>
    <circle cx="340" cy="220" r="3.4" fill="#a78bfa"/>
    <!-- n6 (hub) -->
    <circle cx="450" cy="140" r="20" fill="url(#np-halo)"><animate attributeName="r" values="18;28;18" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="140" r="5" fill="#fef3c7"/>
    <!-- n7 -->
    <circle cx="560" cy="90" r="14" fill="url(#np-halo)"><animate attributeName="r" values="14;22;14" dur="3.3s" repeatCount="indefinite" begin="1.7s"/></circle>
    <circle cx="560" cy="90" r="3.4" fill="#4fbcff"/>
    <!-- n8 -->
    <circle cx="520" cy="250" r="14" fill="url(#np-halo-v)"><animate attributeName="r" values="14;22;14" dur="3.5s" repeatCount="indefinite" begin="0.7s"/></circle>
    <circle cx="520" cy="250" r="3.4" fill="#a78bfa"/>
    <!-- n9 (hub) -->
    <circle cx="640" cy="180" r="18" fill="url(#np-halo)"><animate attributeName="r" values="16;26;16" dur="2.6s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="640" cy="180" r="4.6" fill="#fef3c7"/>
    <!-- n10 -->
    <circle cx="620" cy="320" r="14" fill="url(#np-halo)"><animate attributeName="r" values="14;22;14" dur="3.2s" repeatCount="indefinite" begin="1.1s"/></circle>
    <circle cx="620" cy="320" r="3.4" fill="#4fbcff"/>
  </g>

  <!-- Signal pulses (animateMotion along edges) -->
  <g filter="url(#np-glow)">
    <circle r="3.2" fill="#7ddbff">
      <animateMotion dur="1.8s" repeatCount="indefinite" begin="0s"><mpath href="#np-e1"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="1.8s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle r="3.2" fill="#7ddbff">
      <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.6s"><mpath href="#np-e5"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.4s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle r="3.2" fill="#c4b5fd">
      <animateMotion dur="2.0s" repeatCount="indefinite" begin="0.2s"><mpath href="#np-e6"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.0s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle r="3.2" fill="#7ddbff">
      <animateMotion dur="1.6s" repeatCount="indefinite" begin="1.0s"><mpath href="#np-e7"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="1.6s" repeatCount="indefinite" begin="1.0s"/>
    </circle>
    <circle r="3.2" fill="#7ddbff">
      <animateMotion dur="2.2s" repeatCount="indefinite" begin="0.4s"><mpath href="#np-e8"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.2s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle r="3.2" fill="#c4b5fd">
      <animateMotion dur="2.6s" repeatCount="indefinite" begin="0.8s"><mpath href="#np-e10"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.6s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle r="3.2" fill="#fef3c7">
      <animateMotion dur="1.7s" repeatCount="indefinite" begin="0.3s"><mpath href="#np-e11"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="1.7s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle r="3.2" fill="#7ddbff">
      <animateMotion dur="2.0s" repeatCount="indefinite" begin="1.4s"><mpath href="#np-e13"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.0s" repeatCount="indefinite" begin="1.4s"/>
    </circle>
    <circle r="3.2" fill="#c4b5fd">
      <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.5s"><mpath href="#np-e15"/></animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.4s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>

  <!-- Vertical separator -->
  <line x1="800" y1="40" x2="800" y2="380" stroke="#1a2a4a" stroke-width="0.6"/>

  <!-- Side panel -->
  <g font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" fill="#a5b4cf">
    <text x="840" y="80" font-size="10" letter-spacing="4" fill="#4fbcff">NEURAL/PULSE/LATTICE</text>
    <text x="840" y="98" font-size="10" letter-spacing="4" fill="#a5b4cf">v.2026.05 · ONLINE</text>

    <text x="840" y="148" font-family="'Space Grotesk', system-ui, sans-serif" font-size="34" font-weight="700" fill="#fef3c7" letter-spacing="-0.5">Jane Doe</text>
    <text x="840" y="170" font-size="11" letter-spacing="3" fill="#4fbcff">FRONTEND · INTERFACE · MOTION</text>

    <line x1="840" y1="190" x2="1140" y2="190" stroke="#1a2a4a" stroke-width="0.6"/>

    <g transform="translate(840,214)" font-size="11" fill="#a5b4cf">
      <text x="0" y="0">nodes</text>     <text x="160" y="0" fill="#fef3c7">10</text>
      <text x="0" y="20">edges</text>     <text x="160" y="20" fill="#fef3c7">15</text>
      <text x="0" y="40">signals/sec</text><text x="160" y="40" fill="#fef3c7">9</text>
      <text x="0" y="60">commits/yr</text> <text x="160" y="60" fill="#fef3c7">1,842</text>
      <text x="0" y="80">prs merged</text> <text x="160" y="80" fill="#fef3c7">86</text>
    </g>

    <line x1="840" y1="320" x2="1140" y2="320" stroke="#1a2a4a" stroke-width="0.6"/>

    <text x="840" y="344" font-size="10" letter-spacing="3" fill="#4fbcff">→ TRANSMIT</text>
    <text x="840" y="362" font-size="11" fill="#a5b4cf">jane.dev   @janedoe</text>
  </g>

  <!-- Status pill -->
  <g transform="translate(40,380)" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="3">
    <circle cx="6" cy="-3" r="3.5" fill="#4ade80">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="20" y="0" fill="#a5b4cf">SYSTEM NOMINAL · LATENCY 12ms · UPTIME 2,184d</text>
  </g>
</svg>
