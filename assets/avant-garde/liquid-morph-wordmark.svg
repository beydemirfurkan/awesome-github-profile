<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="Liquid Morph Wordmark">
  <defs>
    <!-- Subtle paper grain -->
    <filter id="lm-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.06
                            0 0 0 0 0.06
                            0 0 0 0 0.06
                            0 0 0 0.04 0"/>
    </filter>
  </defs>

  <!-- Paper -->
  <rect width="1200" height="420" fill="#f5efe0"/>
  <!-- Grain -->
  <rect width="1200" height="420" filter="url(#lm-grain)"/>

  <!-- Top register strip -->
  <g transform="translate(60,52)" font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace" font-size="10" letter-spacing="3" fill="#0a0a0a">
    <line x1="0" y1="-10" x2="22" y2="-10" stroke="#0a0a0a" stroke-width="0.7"/>
    <line x1="0" y1="-10" x2="0" y2="12" stroke="#0a0a0a" stroke-width="0.7"/>
    <text x="32" y="-6">STUDIO  ·  EST. 2017  ·  ISTANBUL</text>
  </g>
  <g transform="translate(1140,52)" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="3" fill="#0a0a0a" text-anchor="end">
    <line x1="0" y1="-10" x2="-22" y2="-10" stroke="#0a0a0a" stroke-width="0.7"/>
    <line x1="0" y1="-10" x2="0" y2="12" stroke="#0a0a0a" stroke-width="0.7"/>
    <text x="-32" y="-6">N° MMXXVI / 003</text>
  </g>

  <!-- Signal-red accent column -->
  <line x1="60" y1="96" x2="60" y2="324" stroke="#d62828" stroke-width="3"/>

  <!-- Wordmark -->
  <g font-family="'Bodoni Moda', 'Playfair Display', 'Tiempos Headline', Georgia, serif" font-weight="900" fill="#0a0a0a">
    <text x="92" y="270" font-size="200" letter-spacing="-9">JANE</text>
  </g>

  <!-- Morphing glyph (right side) -->
  <g transform="translate(960,194)">
    <path fill="#0a0a0a" stroke="none">
      <animate attributeName="d"
        values="
          M 0 -88 C 49 -88 88 -49 88 0 C 88 49 49 88 0 88 C -49 88 -88 49 -88 0 C -88 -49 -49 -88 0 -88 Z;
          M 0 -88 C 0 -88 88 0 88 0 C 88 0 0 88 0 88 C 0 88 -88 0 -88 0 C -88 0 0 -88 0 -88 Z;
          M 0 -88 C 70 -88 88 -70 88 0 C 88 70 70 88 0 88 C -70 88 -88 70 -88 0 C -88 -70 -70 -88 0 -88 Z;
          M 0 -88 C 32 -52 88 -32 88 0 C 88 32 32 52 0 88 C -32 52 -88 32 -88 0 C -88 -32 -32 -52 0 -88 Z;
          M 0 -88 C 22 -68 70 -22 88 0 C 70 22 22 68 0 88 C -22 68 -70 22 -88 0 C -70 -22 -22 -68 0 -88 Z;
          M 0 -88 C 49 -88 88 -49 88 0 C 88 49 49 88 0 88 C -49 88 -88 49 -88 0 C -88 -49 -49 -88 0 -88 Z
        "
        dur="14s" repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1; 0.4 0 0.2 1"
      />
    </path>
    <!-- Inset hairline border -->
    <path fill="none" stroke="#d62828" stroke-width="1" stroke-dasharray="2 4" opacity="0.7">
      <animate attributeName="d"
        values="
          M 0 -104 C 58 -104 104 -58 104 0 C 104 58 58 104 0 104 C -58 104 -104 58 -104 0 C -104 -58 -58 -104 0 -104 Z;
          M 0 -104 C 0 -104 104 0 104 0 C 104 0 0 104 0 104 C 0 104 -104 0 -104 0 C -104 0 0 -104 0 -104 Z;
          M 0 -104 C 82 -104 104 -82 104 0 C 104 82 82 104 0 104 C -82 104 -104 82 -104 0 C -104 -82 -82 -104 0 -104 Z;
          M 0 -104 C 38 -62 104 -38 104 0 C 104 38 38 62 0 104 C -38 62 -104 38 -104 0 C -104 -38 -38 -62 0 -104 Z;
          M 0 -104 C 26 -80 82 -26 104 0 C 82 26 26 80 0 104 C -26 80 -82 26 -104 0 C -82 -26 -26 -80 0 -104 Z;
          M 0 -104 C 58 -104 104 -58 104 0 C 104 58 58 104 0 104 C -58 104 -104 58 -104 0 C -104 -58 -58 -104 0 -104 Z
        "
        dur="14s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Subtle baseline rule under wordmark -->
  <line x1="92" y1="290" x2="846" y2="290" stroke="#0a0a0a" stroke-width="0.6"/>
  <text x="846" y="304" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0a0a0a" letter-spacing="3">— 4 GLYPHS · 1 MARK · 6 STATES</text>

  <!-- Bottom strip -->
  <line x1="60" y1="360" x2="1140" y2="360" stroke="#0a0a0a" stroke-width="0.5"/>
  <g font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="3" fill="#0a0a0a">
    <text x="60" y="382">INTERFACE  /  TYPE  /  MOTION  /  RUNTIME ESSAYS</text>
    <text x="1140" y="382" text-anchor="end" fill="#d62828">JANE.DEV  →</text>
  </g>

  <!-- Registration crosses (printer's marks) -->
  <g stroke="#0a0a0a" stroke-width="0.6" fill="none">
    <g transform="translate(28,28)">
      <circle r="6"/>
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
    </g>
    <g transform="translate(1172,28)">
      <circle r="6"/>
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
    </g>
    <g transform="translate(28,392)">
      <circle r="6"/>
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
    </g>
    <g transform="translate(1172,392)">
      <circle r="6"/>
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <line x1="0" y1="-10" x2="0" y2="10"/>
    </g>
  </g>
</svg>
